[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
viaIR = true
optimizer = true
# Lower runs = smaller bytecode (stays under 24kb limit); increase for production if needed
optimizer_runs = 200


# File system permissions for scripts
fs_permissions = [
    { access = "read", path = "src/oracle/chainlink/GetResult.js" },
    { access = "read", path = "src/oracle/chainlink" },
    { access = "read", path = "src" }
]

# Environment variables are loaded from .env file
# [profile.default.env]
# baseSepolia="${BASE_SEPOLIA_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
