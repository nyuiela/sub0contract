[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
viaIR = true
optimizer = true
# Lower runs = smaller bytecode (stays under 24kb limit); increase for production if needed
optimizer_runs = 200
cbor_metadata = true
extra_output = ["metadata"]

 

# File system permissions for scripts
fs_permissions = [
    { access = "read", path = "src/oracle/chainlink/GetResult.js" },
    { access = "read", path = "src/oracle/chainlink" },
    { access = "read", path = "src" }
]

# Environment variables are loaded from .env file
# [profile.default.env]
# baseSepolia="${BASE_SEPOLIA_RPC_URL}"

# Celo Sepolia testnet (chain ID 11142220)
# Uses EIP-1559 with a minimum base fee; foundry needs --legacy flag or the network
# section below to handle the non-standard fee market gracefully.
[rpc_endpoints]
celo-sepolia = "https://forno.celo-sepolia.celo-testnet.org/"

[etherscan]
celo-sepolia = { key = "${CELOSCAN_API_KEY}", url = "https://sepolia.celoscan.io/api", chain = 11142220 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
